<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
    <alias>
        <family>sans-serif</family>
        <prefer><family>Roboto Medium</family></prefer>
    </alias>
    <alias>
        <family>monospace</family>
        <prefer><family>Roboto Mono Medium</family></prefer>
    </alias>
</fontconfig>
